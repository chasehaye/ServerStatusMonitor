interval: 10s

servers:
  - name: Google
    url: https://www.google.com
    timeout: 5s

  - name: GitHub
    url: https://github.com
    timeout: 5s

  - name: Cloudflare DNS
    url: https://www.cloudflare.com
    timeout: 5s

  - name: Internal DB
    url: tcp://db.internal:5432
    timeout: 3s

  - name: Bad Server
    url: https://this.does.not.exist.example.com
    timeout: 5s

  - name: Google Public DNS (TCP)
    url: tcp://8.8.8.8:53
    timeout: 2s

  - name: HTTP to HTTPS Redirect Test
    url: http://github.com
    timeout: 5s

  - name: GitHub 404 Error Test
    url: https://github.com/this-page-absolutely-does-not-exist-12345
    timeout: 5s